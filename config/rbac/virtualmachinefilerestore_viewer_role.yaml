# This rule is not used by the project vm-file-restore-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to filerestore.kubevirt.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: vm-file-restore-operator
    app.kubernetes.io/managed-by: kustomize
  name: virtualmachinefilerestore-viewer-role
rules:
- apiGroups:
  - filerestore.kubevirt.io
  resources:
  - virtualmachinefilerestores
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - filerestore.kubevirt.io
  resources:
  - virtualmachinefilerestores/status
  verbs:
  - get
